name: CD - Build and Push Docker Images

on:
  push:
    branches:
      - main
      - develop # 🚀 Te permet de tester directement sur ta branche de dev

jobs:
  # ==========================================
  # 1. JOBS DE BUILD ET PUSH DOCKER
  # ==========================================

  build-and-push-backend:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          # 🌟 Correction du chemin vers ton vrai dossier de TP
          context: ./docker-3tiers-lab/backend-api/simpleapi
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
          push: true

  build-and-push-database:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          # 🌟 Correction du chemin vers ton vrai dossier de TP
          context: ./docker-3tiers-lab/database
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: true

  build-and-push-httpd:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          # 🌟 Correction du chemin vers ton vrai dossier de TP
          context: ./docker-3tiers-lab/http
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
          push: true

  # ==========================================
  # 2. JOB DE DÉPLOIEMENT CONTINU (ANSIBLE)
  # ==========================================

  deploy:
    needs: [build-and-push-backend, build-and-push-database, build-and-push-httpd]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Configuration propre de la clé SSH et récupération automatique de l'empreinte du serveur
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 400 ~/.ssh/id_rsa
          # 🌟 On scanne l'empreinte de TON serveur Franklin pour éviter le blocage
          ssh-keyscan franklin.kalfadangpalai.takima.school >> ~/.ssh/known_hosts

      # Installation d'Ansible
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      # Installation de la collection Docker requise pour Ansible
      - name: Install Ansible Docker collection
        run: ansible-galaxy collection install community.docker

      # Exécution du Playbook avec la méthode de substitution de fichier pour le Vault
      - name: Run Ansible playbook
        run: |
          ansible-playbook -i ansible/inventories/setup.yml ansible/playbook.yml --vault-password-file <(echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}")