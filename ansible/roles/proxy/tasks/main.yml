---
# tasks file for roles/proxy
- name: Run Apache HTTPD Proxy Container
  docker_container:
    name: httpd
    image: franklinpalai/tp-devops-httpd:latest
    pull: true
    networks:
      - name: proxy-network
    ports:
      - "80:80"
    env:
      BACKEND_URL: "backend:8080"
      FRONTEND_URL: "frontend:80"
    restart_policy: always
    state: started