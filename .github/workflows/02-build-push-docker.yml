name: CD - Build and Push Docker Images

on:
  push:
    branches:
      - main
      - develop # 🚀 Indispensable pour que GitHub suive tes modifications en direct sur ta branche de dev !

jobs:
  # JOB 1 : Couche Data (PostgreSQL)
  build-and-push-database:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          # 🌟 Vrai chemin direct vers ton API
          context: ./backend
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
          push: true

  # JOB 2 : Couche API / Métier (Spring Boot)
  build-and-push-backend:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          # 🌟 Vrai chemin direct vers ta bdd
          context: ./database
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: true

  build-and-push-httpd:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          # 🌟 Vrai chemin direct vers ton serveur Apache
          context: ./httpd
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
          push: true

  # 🚀 JOB DE DÉPLOIEMENT AUTOMATISÉ AVEC LE VAULT
  deploy:
    needs: [build-and-push-backend, build-and-push-database, build-and-push-httpd]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Configuration propre de la clé SSH et récupération automatique de l'empreinte du serveur (méthode validée de ton ami)
      - name: Set up SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ANSIBLE_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 400 ~/.ssh/id_rsa
          ssh-keyscan franklin.kalfadangpalai.takima.school >> ~/.ssh/known_hosts

      # 2. Installation d'Ansible
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      # 3. Installation de la collection Docker requise pour Ansible
      - name: Install Ansible Docker collection
        run: ansible-galaxy collection install community.docker

      # 4. Exécution du Playbook en injectant le mot de passe de ton coffre chiffré
      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i ansible/inventories/setup.yml ansible/playbook.yml --vault-password-file <(echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}")