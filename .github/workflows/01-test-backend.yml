name: Backend Test & Quality

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  # JOB 1 : Compilation et Tests Unitaires/Intégration
  build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build and Test with Maven
        run: mvn -B clean verify --file ./backend/pom.xml

  # JOB 2 : Analyse de code de manière isolée
  sonar-analysis:
    needs: build-and-test # Ne se lance que si le premier job réussit
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: SonarCloud Scan
        run: |
          mvn -B sonar:sonar \
            -Dsonar.projectKey=Franklinpalai \
            -Dsonar.organization=franklinpalai \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            --file ./backend/pom.xml