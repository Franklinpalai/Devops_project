name: CI devops 2026

# Déclencheurs (Events) : Quand le robot doit-il se réveiller ?
on:
  push:
    branches: 
      - main
      - develop
  pull_request:

jobs:
  # Job 1 : Compiler et tester l'application Java Backend
  test-backend:
    runs-on: ubuntu-24.04  # Choix de la machine virtuelle Linux fournie par GitHub

    steps:
      # Étape 1 : Cloner le code source de ton dépôt GitHub sur le Runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Étape 2 : Installer le JDK 21 requis pour Spring Boot sur le Runner
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin' # Distribution OpenJDK recommandée
          java-version: '21'

      # Étape 3 : Lancer la commande Maven pour nettoyer, compiler et tester l'API
      - name: Build and test with Maven
        # On spécifie le chemin du pom.xml car l'API est dans le sous-dossier backend/simple-api
        run: mvn clean verify --file ./backend/simple-api/pom.xml