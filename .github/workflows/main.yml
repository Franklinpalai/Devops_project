name: CI devops 2026

on:
  push:
    branches: 
      - main
      - develop
  pull_request:

jobs:
  # JOB 1 : Lancement des tests unitaires et d'intégration
  test-backend:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build and test with Maven
        run: mvn clean verify --file ./backend/pom.xml

  # JOB 2 : Build des images et Push sur Docker Hub
  build-and-push-docker-image:
    needs: test-backend # Ne se lance que si les tests passent !
    runs-on: ubuntu-24.04

    steps:
      # Étape 1 : Récupérer le code source
      - name: Checkout code
        uses: actions/checkout@v4

      # Étape 2 : Se connecter au Docker Hub en utilisant tes secrets GitHub
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login --username ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      # Étape 3 : Build & Push de l'image Backend
      - name: Build image and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend # Dossier contenant le Dockerfile du backend
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-simple-api:latest
          # On push uniquement si on est sur la branche main
          push: ${{ github.ref == 'refs/heads/main' }}

      # Étape 4 : Build & Push de l'image Database
      - name: Build image and push database
        uses: docker/build-push-action@v6
        with:
          context: ./database # Dossier contenant le Dockerfile de la BDD
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-database:latest
          push: ${{ github.ref == 'refs/heads/main' }}

      # Étape 5 : Build & Push de l'image HTTPD (Apache)
      - name: Build image and push httpd
        uses: docker/build-push-action@v6
        with:
          context: ./httpd # Dossier contenant le Dockerfile d'Apache
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/tp-devops-httpd:latest
          push: ${{ github.ref == 'refs/heads/main' }}